log file /var/log/sdplane.log
log stdout

#debug sdplane netlink
#debug sdplane fdb-change
#debug sdplane rib
debug sdplane router

set rte_eal argv -c 0x7

rte_eal_init
set mempool

set worker lthread rib-manager
set worker lthread stat-collector
set worker lthread neigh-manager
set worker lthread netlink-thread

set worker lcore 1 router
set worker lcore 2 l3-tap-handler

set device 02:00.0 driver unbound
set device 02:00.0 driver uio_pci_generic driver_override
set device 02:00.0 driver uio_pci_generic bind

stop port all
set port all dev-configure 4 4
set port all nrxdesc 1024
set port all ntxdesc 1024

set port all promiscuous enable
start port all

set thread 1 port 0 queue 0

sleep 5
start worker lcore all

set vswitch 300 vlan 300
set vswitch 300 port 0 tagged
set vswitch 300 router-if rif300 vlan-id 0
set vswitch 300 capture-if cif300

set vswitch 400 vlan 400
set vswitch 400 port 0 tagged
set vswitch 400 router-if rif400 vlan-id 0
set vswitch 400 capture-if cif400

sleep 5
update port status
