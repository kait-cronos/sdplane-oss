
log file /var/log/sdplane.log
log stdout

debug sdplane rib

set rte_eal argv -c 0xff
rte_eal_init
set mempool

set worker lthread rib-manager
set worker lthread stat-collector
set worker lthread neigh-manager
set worker lthread netlink-thread

set worker lcore 1 l3-tap-handler
set worker lcore 2 srv6-router
set worker lcore 3 srv6-router

# need to stop port before changing ports.
stop port all
set port all dev-configure 1 4
set port all nrxdesc 1024
set port all ntxdesc 1024

# in VM, sleep is necessary to start lthread immediately.
sleep 0

set port all promiscuous enable
start port all

# queue config should be after rib-manager.
set thread 2 port 0 queue 0
set thread 3 port 1 queue 0
set thread 3 port 2 queue 0

# waiting for the port to come up.
sleep 5
start worker lcore all

set vswitch 10 vlan 10
set vswitch 10 port 0 untag
set vswitch 10 router-if router-1-00-0
set vswitch 10 capture-if capture-1-00-0

set vswitch 20 vlan 20
set vswitch 20 port 1 untag
set vswitch 20 router-if router-1-00-1
set vswitch 20 capture-if capture-1-00-1

set srv6 local-sid fd77:bb::1

