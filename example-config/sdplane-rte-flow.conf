
log file /var/log/sdplane.log
log stdout

#debug sdplane fdb-change
#debug sdplane rib
debug sdplane stat-collector

set rte_eal argv -c 0xff
rte_eal_init
set mempool

set worker lthread rib-manager
set worker lthread stat-collector

#set worker lcore 1 enhanced-repeater
set worker lcore 2 l3-tap-handler
set worker lcore 3 vvf_vidsw
set worker lcore 4 vvf_vidsw


set vvf_vidsw 3 main port 0 rxqueue 0 txqueue 0
set vvf_vidsw 3 sub port 1 rxqueue 0 txqueue 0
set vvf_vidsw 3 out port 2 rxqueue 0 txqueue 0
set vvf_vidsw 3 main igmp_join src 192.168.34.222 addr 239.88.88.2
set vvf_vidsw 3 sub igmp_join src 192.168.34.222 addr 239.88.88.6

set vvf_vidsw 4 main port 0 rxqueue 1 txqueue 1
set vvf_vidsw 4 sub port 1 rxqueue 1 txqueue 1
set vvf_vidsw 4 out port 2 rxqueue 1 txqueue 1
set vvf_vidsw 4 main igmp_join src 192.168.34.223 addr 239.88.88.3
set vvf_vidsw 4 sub igmp_join src 192.168.34.223 addr 239.88.88.7

set vvf_vidsw mempool superjumbo 262143

# need to stop port before changing ports.
stop port all
set port all dev-configure 3 4
#set port all nrxdesc 1024
set port all nrxdesc 8192
set port all ntxdesc 1024

set port all promiscuous enable
start port all

# queue config should be after rib-manager.
#set thread 3 port 0 queue 0
#set thread 4 port 0 queue 1

# waiting for the port to come up.
sleep 5

# update port status
start worker lcore all

