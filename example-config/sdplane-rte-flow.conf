#set vswitch 30 port 2 untag
#set vswitch 30 router-if port-3-00-0

set rte-flow-pattern 0 index 0 end

#set rte-flow-pattern 0 index 0 ether any
#set rte-flow-pattern 0 index 1 end

#set rte-flow-pattern 0 index 0 ether any
#set rte-flow-pattern 0 index 1 vlan zero
#set rte-flow-pattern 0 index 1 vlan id 100
#set rte-flow-pattern 0 index 2 ipv4 zero
#set rte-flow-pattern 0 index 2 ipv4 src 100.100.100.100
#set rte-flow-pattern 0 index 2 ipv4 dst 200.200.200.200
#set rte-flow-pattern 0 index 3 end

#set rte-flow port 0 pattern 0 action queue 1
#set rte-flow port 0 pattern 0 action drop
set rte-flow port 0 pattern 0 action none

set rte-flow-pattern 1 index 0 end

#set rte-flow-pattern 1 index 0 ether any
#set rte-flow-pattern 1 index 1 end

#set rte-flow-pattern 1 index 0 ether any
#set rte-flow-pattern 1 index 1 vlan zero
#set rte-flow-pattern 1 index 1 vlan id 200
#set rte-flow-pattern 1 index 2 ipv4 zero
#set rte-flow-pattern 1 index 2 ipv4 src 100.100.100.100
#set rte-flow-pattern 1 index 2 ipv4 dst 200.200.200.200
#set rte-flow-pattern 1 index 3 end
set rte-flow port 0 pattern 1 action queue 2

